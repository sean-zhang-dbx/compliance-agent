server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Databricks Model Serving endpoint
    # Set BACKEND_URL at deploy time via env substitution
    location /invocations {
        proxy_pass ${BACKEND_URL}/invocations;
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Content-Type application/json;
    }
}
