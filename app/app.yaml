command:
  - uvicorn
  - main:app
  - --host=0.0.0.0
  - --port=8000

env:
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4-6"
  - name: VISION_LLM_ENDPOINT
    value: "databricks-claude-sonnet-4-6"
  - name: FAST_LLM_ENDPOINT
    value: "databricks-claude-haiku-4-5"
  - name: UC_CATALOG
    value: "REPLACE_ME"
  - name: UC_SCHEMA
    value: "gsk_compliance"
  - name: UC_VOLUME
    value: "evidence_files"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Users/${DATABRICKS_USER}/gsk-compliance-agent"

resources:
  - name: sonnet-endpoint
    serving_endpoint: databricks-claude-sonnet-4-6
    permission: CAN_QUERY
  - name: haiku-endpoint
    serving_endpoint: databricks-claude-haiku-4-5
    permission: CAN_QUERY
  - name: mlflow-experiment
    mlflow_experiment: /Users/${DATABRICKS_USER}/gsk-compliance-agent
    permission: CAN_EDIT
